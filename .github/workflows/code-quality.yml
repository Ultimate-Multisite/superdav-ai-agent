name: Code Quality

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'TODO.md'
      - 'todo/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.agents/**'
  workflow_dispatch:

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ESLint + Stylelint merged into a single job — saves a full npm ci.
  lint:
    name: Lint (ESLint + Stylelint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --ext .js,.jsx --format stylish

      - name: Run Stylelint
        run: npx stylelint "src/**/*.css" --formatter verbose

  # Build + bundle size merged — avoids a second npm ci + npm run build.
  build:
    name: Build & Bundle Size
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check for build artifacts
        run: |
          if [ ! -d "build" ] || [ -z "$(ls -A build/*.js 2>/dev/null)" ]; then
            echo "Build failed - no JS files in build directory"
            exit 1
          fi
          echo "Build successful - artifacts found:"
          ls -la build/

      - name: Check bundle size budgets
        run: npm run size
