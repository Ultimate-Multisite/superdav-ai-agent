name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpunit:
    name: PHPUnit (wp-env)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, zip, pdo_sqlite, mysqli
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install npm dependencies
        run: npm ci

      # wp-env's pullAll (docker compose pull) re-pulls the wordpress:cli-php8.2
      # base image even after we patch it, because it runs on every fresh CI runner
      # when the config hash has never been cached. Adding --ignore-buildable tells
      # docker compose pull to skip base images for services that use build:, so
      # our patched image is used when wp-env builds the CLI container.
      - name: Patch wp-env to skip pulling CLI base image
        run: |
          WP_ENV_INDEX="node_modules/@wordpress/env/lib/runtime/docker/index.js"
          sed -i \
            's/await dockerCompose\.pullAll( dockerComposeConfig );/await dockerCompose.pullAll( { ...dockerComposeConfig, commandOptions: ["--ignore-buildable"] } );/' \
            "$WP_ENV_INDEX"
          grep -q 'ignore-buildable' "$WP_ENV_INDEX" || { echo "Patch failed — line not found"; exit 1; }

      # The wordpress:cli-php8.2 base image ships with WP-CLI < 2.8.0, which
      # emits "Deprecated: trim(): Passing null" on PHP 8.2 and exits with an
      # empty "Error:" during wp core multisite-install. Patch the local image
      # with the latest WP-CLI phar before wp-env builds its CLI container.
      # The --ignore-buildable patch above ensures docker compose pull does not
      # re-pull this image and overwrite our fix.
      - name: Update WP-CLI in base Docker image
        run: |
          docker pull wordpress:cli-php8.2
          printf '%s\n' \
            'FROM wordpress:cli-php8.2' \
            'USER root' \
            'RUN curl -sS -o /usr/local/bin/wp https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar && chmod +x /usr/local/bin/wp' \
            'USER www-data' \
          | docker build -t wordpress:cli-php8.2 -

      - name: Start wp-env
        run: npm run wp-env:start

      - name: Run PHPUnit via wp-env
        run: npm run test:php

      - name: Stop wp-env
        if: always()
        run: npm run wp-env:stop

  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPCS
        run: vendor/bin/phpcs

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --error-format=github
