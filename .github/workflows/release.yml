name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, zip
          tools: composer:v2

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Create ZIP files
        run: |
          # npm run build → archive.js → composer archive-project → ai-agent-for-wp.zip
          cp ai-agent-for-wp.zip gratis-ai-agent-${{ steps.version.outputs.VERSION }}.zip
          # Stable-name zip so playground blueprints can reference /releases/latest/download/
          cp ai-agent-for-wp.zip gratis-ai-agent.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gratis-ai-agent-${{ steps.version.outputs.VERSION }}.zip
            gratis-ai-agent.zip
          name: Gratis AI Agent v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

